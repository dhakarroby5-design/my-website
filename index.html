<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roby Affiliate Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

/* HEADER */

header{
    background:orange;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:50px;
    margin-bottom:10px;
}

header p{
    font-size:24px;
}

/* NAVBAR */

nav{
    background:black;
    padding:18px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:26px;
    font-weight:bold;
}

/* TITLE */

.section-title{
    font-size:70px;
    font-weight:bold;
    margin:40px 30px;
}

/* PRODUCTS */

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
    padding:25px;
}

/* CARD */

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* IMAGE */

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
    background:#ddd;
}

/* CONTENT */

.content{
    padding:20px;
}

.content h2{
    font-size:32px;
    margin-bottom:15px;
}

.content p{
    font-size:22px;
    color:#555;
    margin-bottom:20px;
}

/* BUTTON */

.buy-btn{
    display:inline-block;
    background:green;
    color:white;
    text-decoration:none;
    padding:16px 40px;
    border-radius:15px;
    font-size:26px;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:700px){

header h1{
    font-size:36px;
}

header p{
    font-size:18px;
}

nav a{
    font-size:18px;
    margin:10px;
}

.section-title{
    font-size:42px;
}

.products{
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card img{
    height:220px;
}

.content h2{
    font-size:20px;
}

.content p{
    font-size:14px;
}

.buy-btn{
    font-size:16px;
    padding:12px 24px;
}

}

</style>
</head>

<body>

<header>
    <h1>🚀 Rocket Selling</h1>
    <p>Best Deals All Over India</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="section-title">
🔥 Trending Products
</div>

<div class="products" id="products"></div>

<script>

const products = [

{
title:"Allen Solly Men Shirt",
description:"Stylish cotton casual shirt for men",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-190344-2.png",
link:"https://www.amazon.in/"
},

{
title:"Campus Running Shoes",
description:"Stylish and comfortable running shoes",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-214659-2.png",
link:"https://www.amazon.in/"
},

{
title:"Peter England Trousers",
description:"Grey casual trousers for men",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-215712-2.png",
link:"https://www.amazon.in/"
},

{
title:"Stylish Sunglasses",
description:"Rectangle stylish sunglasses",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220146-2.png",
link:"https://www.amazon.in/"
},

{
title:"Samsung S24 Ultra 5G",
description:"Premium Samsung smartphone",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220559-2.png",
link:"https://www.amazon.in/"
},

{
title:"Havells Beard Trimmer",
description:"Rechargeable beard trimmer",
image:"https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220958-2.png",
link:"https://www.amazon.in/"
}

];

const productsDiv = document.getElementById("products");

products.forEach(product => {

productsDiv.innerHTML += `

<div class="card">

<img src="${product.image}" alt="${product.title}">

<div class="content">

<h2>${product.title}</h2>

<p>${product.description}</p>

<a class="buy-btn" href="${product.link}" target="_blank">
Buy Now
</a>

</div>

</div>

`;

});

</script>

</body>
</html>
