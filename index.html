<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roby Affiliate Store</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f2f2f2;
}

/* HEADER */

header{
    background:orange;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    margin-top:10px;
    font-size:20px;
}

/* MENU */

nav{
    background:black;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:22px;
    font-weight:bold;
}

/* TITLE */

.section-title{
    font-size:60px;
    font-weight:bold;
    margin:40px 30px;
}

/* PRODUCT AREA */

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:20px;
}

/* CARD */

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* IMAGE */

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

/* CONTENT */

.content{
    padding:20px;
}

.content h2{
    font-size:28px;
    margin:0;
}

.content p{
    font-size:18px;
    color:#555;
}

/* BUTTON */

.buy-btn{
    display:inline-block;
    background:green;
    color:white;
    padding:15px 35px;
    border-radius:15px;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.buy-btn:hover{
    background:darkgreen;
}

</style>
</head>

<body>

<header>
    <h1>🚀 Roby Affiliate Store</h1>
    <p>Best Deals All Over India</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="section-title">
🔥 Trending Products
</div>

<div class="products" id="products"></div>

<script>

/* PRODUCTS */

const products = [

{
title:"Allen Solly Men Shirt",
description:"Stylish cotton casual shirt for men",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
},

{
title:"Campus Running Shoes",
description:"Stylish and comfortable running shoes",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
},

{
title:"Peter England Trousers",
description:"Grey casual trousers for men",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
},

{
title:"Stylish Sunglasses",
description:"Rectangle stylish sunglasses",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
},

{
title:"Samsung S24 Ultra 5G",
description:"Premium Samsung smartphone",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
},

{
title:"Havells Beard Trimmer",
description:"Rechargeable beard trimmer",
image:"IMAGE_LINK_HERE",
link:"AMAZON_LINK_HERE"
}

];

/* SHOW PRODUCTS */

const productsDiv = document.getElementById("products");

products.forEach(product => {

productsDiv.innerHTML += `

<div class="card">

<img src="${product.image}" alt="${product.title}">

<div class="content">

<h2>${product.title}</h2>

<p>${product.description}</p>

<a class="buy-btn" href="${product.link}" target="_blank">
Buy Now
</a>

</div>

</div>

`;

});

</script>

</body>
</html>
