<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Roby Affiliate Store</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#222;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    .card h2{
      font-size:20px;
      margin-bottom:10px;
    }

    .card p{
      color:#555;
      margin-bottom:15px;
      line-height:1.5;
    }

    .buy-btn{
      display:inline-block;
      padding:10px 18px;
      background:#ff9900;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

    .buy-btn:hover{
      background:#e68a00;
    }

  </style>

</head>

<body>

  <h1>Roby Affiliate Store</h1>

  <div class="products" id="products"></div>

  <script>

    /*
    =========================
    PRODUCT LIST
    NAYA PRODUCT NICHE ADD KARO
    =========================
    */

    const products = [

      {
        title: "Allen Solly Men Shirt",
        description: "Stylish cotton casual shirt for men",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-190344-2.png",
        link: "https://www.amazon.in/Allen-Solly-Geometric-Regular-ASSFWMOF048848_White_40/dp/B07DN1BJ51"
      },

      {
        title: "Campus Running Shoes",
        description: "Comfortable running shoes",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-214659-2.png",
        link: "https://www.amazon.in/Campus-VETRO-L-Gry-V-ORG-Running/dp/B0GH1ZW586"
      },

      {
        title: "Peter England Trousers",
        description: "Grey casual trousers for men",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-215712-2.png",
        link: "https://www.amazon.in/Peter-England-Casual-Pants-PCTFSSSPA79395_Grey/dp/B0DT9RMH2T"
      },

      {
        title: "Stylish Sunglasses",
        description: "Rectangle stylish sunglasses",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220146-2.png",
        link: "https://www.amazon.in/Sheomy-glasses-MC-Rectangle-Sunglasses/dp/B0C28SKXYM"
      },

      {
        title: "Samsung S24 Ultra 5G",
        description: "Premium Samsung smartphone",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220559-2.png",
        link: "https://www.amazon.in/Samsung-Storage-Enhanced-Unmatched-Nightography/dp/B0FDB9H277"
      },

      {
        title: "Havells Beard Trimmer",
        description: "Rechargeable beard trimmer",
        image: "https://raw.githubusercontent.com/dhakarroby5-design/my-website/main/Screenshot_20260508-220958-2.png",
        link: "https://www.amazon.in/HAVELLS-BT5100C-Rechargeable-Beard-Trimmer/dp/B07C6CSF6K"
      }

    ];



    /*
    =========================
    PRODUCT SHOW CODE
    =========================
    */

    const productContainer = document.getElementById("products");

    products.forEach(product => {

      productContainer.innerHTML += `

        <div class="card">

          <img src="${product.image}" alt="${product.title}">

          <div class="card-content">

            <h2>${product.title}</h2>

            <p>${product.description}</p>

            <a href="${product.link}" target="_blank" class="buy-btn">
              Buy Now
            </a>

          </div>

        </div>

      `;

    });



    /*
    =========================
    NAYA PRODUCT ADD KARNE KA FORMAT
    COPY KARKE LAST ME PASTE KARO
    =========================

    ,

    {
      title: "Product Name",
      description: "Product Description",
      image: "IMAGE LINK",
      link: "AMAZON AFFILIATE LINK"
    }

    =========================
    */

  </script>

</body>
</html>
