<!DOCTYPE html>
<html>
<head>
  <title>Roket Book Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f3f6;
    }

    /* HEADER */
    header {
      background: #2874f0;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search {
      width: 50%;
      padding: 7px;
      border-radius: 5px;
      border: none;
    }

    .cart-btn {
      background: #ffcc00;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* BANNER */
    .banner {
      margin: 10px;
      padding: 20px;
      background: linear-gradient(to right, #2874f0, #6fa8ff);
      color: white;
      text-align: center;
      border-radius: 10px;
    }

    .banner button {
      background: #ffcc00;
      border: none;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
    }

    /* CARDS */
    .container {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      width: 50%;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card button {
      background: #ffcc00;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    /* PRODUCT */
    .product {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .product button {
      background: #2874f0;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
    }

    /* CART (HIDDEN DEFAULT) */
    .cart {
      position: fixed;
      right: -250px;
      top: 0;
      width: 250px;
      height: 100%;
      background: white;
      padding: 15px;
      box-shadow: -2px 0 5px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .cart.active {
      right: 0;
    }

    .close-btn {
      background: red;
      color: white;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <h2>Teacher Store</h2>
  <input class="search" placeholder="Search here...">
  <div class="cart-btn" onclick="openCart()">🛒 Cart</div>
</header>

<!-- BANNER -->
<div class="banner">
  <h2>Find Best Teachers</h2>
  <p>50% OFF on Tuition</p>
  <button>Explore</button>
</div>

<!-- TEACHERS -->
<div class="container">
  <div class="card">
    <h3>Math Teacher</h3>
    <p>₹500/month</p>
    <p>⭐⭐⭐⭐⭐</p>
    <button onclick="openCart()">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Science Teacher</h3>
    <p>₹600/month</p>
    <p>⭐⭐⭐⭐⭐</p>
    <button onclick="openCart()">Add to Cart</button>
  </div>
</div>

<!-- PRODUCT -->
<div class="product">
  <h3>Math Book</h3>
  <p>₹299</p>
  <button onclick="openCart()">Buy Now</button>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <button class="close-btn" onclick="closeCart()">X</button>
  <h3>Cart</h3>
  <p>Total: ₹0</p>
  <button>Place Order</button>
</div>

<!-- JS -->
<script>
function openCart() {
  document.getElementById("cart").classList.add("active");
}

function closeCart() {
  document.getElementById("cart").classList.remove("active");
}
</script>

</body>
</html>
