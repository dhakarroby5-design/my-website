<!DOCTYPE html>
<html>
<head>
  <title>Ludo Star Roby Version</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #222;
      color: white;
    }

    h1 {
      margin-top: 10px;
    }

    #board {
      width: 320px;
      height: 320px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(8, 40px);
      grid-template-rows: repeat(8, 40px);
      gap: 2px;
    }

    .cell {
      width: 40px;
      height: 40px;
      background: #555;
    }

    .player1 {
      background: red;
      border-radius: 50%;
    }

    .player2 {
      background: blue;
      border-radius: 50%;
    }

    button {
      padding: 10px;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🎲 Ludo Star Roby Version</h1>
<p id="turn">Player 1 Turn</p>

<div id="board"></div>

<button onclick="rollDice()">Roll Dice</button>
<p id="dice">Dice: -</p>

<script>
let board = document.getElementById("board");
let turnText = document.getElementById("turn");
let diceText = document.getElementById("dice");

let cells = [];
let player1Pos = 0;
let player2Pos = 0;
let turn = 1;

// Create board
for (let i = 0; i < 64; i++) {
  let cell = document.createElement("div");
  cell.classList.add("cell");
  board.appendChild(cell);
  cells.push(cell);
}

// Draw players
function drawPlayers() {
  cells.forEach(cell => {
    cell.innerHTML = "";
  });

  let p1 = document.createElement("div");
  p1.classList.add("player1");

  let p2 = document.createElement("div");
  p2.classList.add("player2");

  cells[player1Pos].appendChild(p1);
  cells[player2Pos].appendChild(p2);
}

drawPlayers();

// Dice roll
function rollDice() {
  let dice = Math.floor(Math.random() * 6) + 1;
  diceText.innerText = "Dice: " + dice;

  if (turn === 1) {
    player1Pos += dice;
    if (player1Pos >= 63) {
      alert("🎉 Player 1 Wins!");
      location.reload();
    }
    turn = 2;
    turnText.innerText = "Player 2 Turn";
  } else {
    player2Pos += dice;
    if (player2Pos >= 63) {
      alert("🎉 Player 2 Wins!");
      location.reload();
    }
    turn = 1;
    turnText.innerText = "Player 1 Turn";
  }

  drawPlayers();
}
</script>

</body>
</html>
