<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Selling</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */

header{
    background:#ff5a00;
    color:white;
    text-align:center;
    padding:25px 15px;
}

header h1{
    font-size:42px;
}

header p{
    margin-top:10px;
    font-size:20px;
}

/* NAVBAR */

nav{
    background:black;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
    font-weight:bold;
}

/* MAIN CONTAINER */

.container{
    width:95%;
    max-width:1300px;
    margin:auto;
    padding:30px 10px;
}

.section-title{
    font-size:40px;
    margin-bottom:25px;
}

/* PRODUCTS */

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* PRODUCT CARD */

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    background:#eee;
}

.card-content{
    padding:20px;
}

.card h2{
    font-size:24px;
    margin-bottom:10px;
}

.card p{
    color:#555;
    margin-bottom:15px;
    line-height:1.5;
}

.buy-btn{
    display:inline-block;
    background:green;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

/* CONTACT */

.contact{
    background:white;
    margin-top:50px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact h2{
    font-size:35px;
    margin-bottom:20px;
}

.contact p{
    font-size:22px;
    margin:12px 0;
}

/* FOOTER */

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* WHATSAPP BUTTON */

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    color:white;
    padding:15px 22px;
    border-radius:50px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

/* CALL BUTTON */

.call{
    position:fixed;
    bottom:90px;
    right:20px;
    background:#007bff;
    color:white;
    padding:15px 22px;
    border-radius:50px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    <h1>🚀 Rocket Selling</h1>
