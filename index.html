<!DOCTYPE html>
<html>
<head>
  <title>Roket Book Store</title>

    <style>
        body {
              font-family: Arial;
                    margin: 0;
                          background: #f1f3f6;
                              }

                                  header {
                                        background: #2874f0;
                                              color: white;
                                                    padding: 15px;
                                                          text-align: center;
                                                                font-size: 24px;
                                                                    }

                                                                        .container {
                                                                              display: flex;
                                                                                    flex-wrap: wrap;
                                                                                          padding: 20px;
                                                                                              }

                                                                                                  .card {
                                                                                                        background: white;
                                                                                                              width: 200px;
                                                                                                                    margin: 10px;
                                                                                                                          padding: 10px;
                                                                                                                                border-radius: 10px;
                                                                                                                                      box-shadow: 0 0 10px rgba(0,0,0,0.1);
                                                                                                                                            text-align: center;
                                                                                                                                                }

                                                                                                                                                    .card img {
                                                                                                                                                          width: 100%;
                                                                                                                                                                height: 150px;
                                                                                                                                                                    }

                                                                                                                                                                        button {
                                                                                                                                                                              background: green;
                                                                                                                                                                                    color: white;
                                                                                                                                                                                          border: none;
                                                                                                                                                                                                padding: 10px;
                                                                                                                                                                                                      margin-top: 10px;
                                                                                                                                                                                                            cursor: pointer;
                                                                                                                                                                                                                }

                                                                                                                                                                                                                    #cart {
                                                                                                                                                                                                                          position: fixed;
                                                                                                                                                                                                                                right: 0;
                                                                                                                                                                                                                                      top: 60px;
                                                                                                                                                                                                                                            background: white;
                                                                                                                                                                                                                                                  width: 200px;
                                                                                                                                                                                                                                                        height: 100%;
                                                                                                                                                                                                                                                              padding: 10px;
                                                                                                                                                                                                                                                                    border-left: 2px solid #ccc;
                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                          </head>

                                                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                                                          <header>🚀 Roket Book Store</header>

                                                                                                                                                                                                                                                                          <div class="container">

                                                                                                                                                                                                                                                                            <div class="card">
                                                                                                                                                                                                                                                                                <img src="https://via.placeholder.com/150">
                                                                                                                                                                                                                                                                                    <h3>Math Book</h3>
                                                                                                                                                                                                                                                                                        <p>₹200</p>
                                                                                                                                                                                                                                                                                            <button onclick="addToCart('Math Book')">Add to Cart</button>
                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                <div class="card">
                                                                                                                                                                                                                                                                                                    <img src="https://via.placeholder.com/150">
                                                                                                                                                                                                                                                                                                        <h3>Science Book</h3>
                                                                                                                                                                                                                                                                                                            <p>₹300</p>
                                                                                                                                                                                                                                                                                                                <button onclick="addToCart('Science Book')">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                    <div class="card">
                                                                                                                                                                                                                                                                                                                        <img src="https://via.placeholder.com/150">
                                                                                                                                                                                                                                                                                                                            <h3>English Book</h3>
                                                                                                                                                                                                                                                                                                                                <p>₹150</p>
                                                                                                                                                                                                                                                                                                                                    <button onclick="addToCart('English Book')">Add to Cart</button>
                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                      <div id="cart">
                                                                                                                                                                                                                                                                                                                                        <h3>🛒 Cart</h3>
                                                                                                                                                                                                                                                                                                                                          <ul id="cartItems"></ul>
                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                                                                                            function addToCart(book) {
                                                                                                                                                                                                                                                                                                                                                let item = document.createElement("li");
                                                                                                                                                                                                                                                                                                                                                    item.innerText = book;
                                                                                                                                                                                                                                                                                                                                                        document.getElementById("cartItems").appendChild(item);
                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                          </script>

                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                          </html
