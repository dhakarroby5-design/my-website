<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Selling</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

/* HEADER */
header{
    background:orange;
    color:white;
    text-align:center;
    padding:25px 10px;
}

header h1{
    font-size:45px;
}

header p{
    font-size:20px;
    margin-top:8px;
}

/* NAVBAR */
nav{
    background:black;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:20px;
    font-weight:bold;
}

/* SECTION */
.section-title{
    font-size:50px;
    padding:30px 20px 10px;
}

/* PRODUCT GRID */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* PRODUCT CARD */
.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    background:#ddd;
}

.card-content{
    padding:20px;
}

.card h2{
    font-size:32px;
    margin-bottom:10px;
}

.card p{
    font-size:22px;
    color:#555;
    margin-bottom:20px;
}

.buy-btn{
    display:inline-block;
    background:green;
    color:white;
    padding:14px 30px;
    border-radius:12px;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
}

/* CONTACT */
.contact{
    background:white;
    margin:30px 20px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.contact h2{
    font-size:45px;
    margin-bottom:20px;
}

.contact p{
    font-size:28px;
    margin:10px 0;
}

/* FLOAT BUTTONS */
.float-buttons{
    position:fixed;
    right:15px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.float-buttons a{
    text-decoration:none;
    color:white;
    padding:15px 25px;
    border-radius:40px;
    font-size:24px;
    font-weight:bold;
}

.call-btn{
    background:#007bff;
}

.whatsapp-btn{
    background:#25d366;
}

/* FOOTER */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
    font-size:20px;
}
</style>
</head>

<body>
